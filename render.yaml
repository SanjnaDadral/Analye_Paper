services:
  - type: web
    name: paper-analyzer
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn paper_analyzer.wsgi:application --workers 1 --timeout 120 --max-requests 1000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: paper-analyzer-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: paper-analyzer-db
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all traffic
